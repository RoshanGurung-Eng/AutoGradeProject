<!doctype html>
<html>
  <head>
    <title>Submit Answer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        padding-top: 40px;
      }

      .badge {
        font-size: 0.85rem !important;
        padding: 0.4rem 0.6rem !important;
        margin: 0.15rem !important;
        font-weight: 500;
      }

      #matched,
      #missing {
        display: flex;
        flex-wrap: wrap;
        gap: 0.25rem;
        min-height: 40px;
      }

      .keyword-container {
        background: #f8f9fa;
        border-radius: 8px;
        padding: 10px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card mx-auto" style="max-width: 600px">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0 text-center">📝 Submit Your Answer</h4>
        </div>
        <div class="card-body">
          <form id="uploadForm" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label"
                ><strong>Select Question:</strong></label
              >
              <select
                class="form-select"
                id="question_id"
                name="question_id"
                required
              >
                <option value="">-- Choose Question --</option>
                {% for q in questions %}
                <option value="{{ q.question_id }}">
                  {{ q.question_id }}: {{ q.question_text|truncatewords:8 }}
                </option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label"
                ><strong>Upload Answer Image:</strong></label
              >
              <input
                type="file"
                class="form-control"
                id="image"
                name="image"
                accept="image/*"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
              <span id="submitText">📤 Submit Answer</span>
              <span
                id="loadingSpinner"
                class="spinner-border spinner-border-sm d-none ms-2"
                role="status"
              ></span>
            </button>
          </form>
        </div>
      </div>

      <div
        id="resultCard"
        class="card mx-auto mt-4 d-none"
        style="max-width: 600px"
      >
        <div class="card-header bg-success text-white">
          <h5 class="mb-0 text-center">✅ Result</h5>
        </div>
        <div class="card-body">
          <div class="mb-3 text-center">
            <h2>
              <strong>Grade:</strong>
              <span id="grade" class="badge bg-primary fs-1 p-3"></span>
            </h2>
          </div>
          <hr />
          <div class="mb-3">
            <strong>Extracted Text:</strong>
            <p
              id="corrected_text"
              class="alert alert-info p-3 mb-0"
              style="white-space: pre-wrap"
            ></p>
          </div>
          <div class="mb-3 mt-3">
            <strong>✅ Matched Keywords:</strong>
            <div id="matched" class="keyword-container"></div>
          </div>
          <div class="mb-3">
            <strong>❌ Missing Keywords:</strong>
            <div id="missing" class="keyword-container"></div>
          </div>
          <div class="alert alert-info">
            <strong>📊 Stats:</strong>
            <span id="stats"></span>
          </div>
          <button class="btn btn-secondary w-100" onclick="location.reload()">
            Submit Another
          </button>
        </div>
      </div>

      <div
        id="errorCard"
        class="card mx-auto mt-4 d-none"
        style="max-width: 600px"
      >
        <div class="card-header bg-danger text-white">
          <h5 class="mb-0 text-center">❌ Error</h5>
        </div>
        <div class="card-body">
          <p id="errorMessage" class="mb-0"></p>
          <button
            class="btn btn-secondary w-100 mt-3"
            onclick="location.reload()"
          >
            Try Again
          </button>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("uploadForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const questionId = document.getElementById("question_id").value;
          const imageFile = document.getElementById("image").files[0];

          if (!questionId) {
            alert("Please select a question!");
            return;
          }

          if (!imageFile) {
            alert("Please select an image!");
            return;
          }

          // Create FormData properly
          const formData = new FormData();
          formData.append("question_id", questionId);
          formData.append("image", imageFile);

          // Get CSRF token from cookie
          function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== "") {
              const cookies = document.cookie.split(";");
              for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === name + "=") {
                  cookieValue = decodeURIComponent(
                    cookie.substring(name.length + 1),
                  );
                  break;
                }
              }
            }
            return cookieValue;
          }

          const csrftoken = getCookie("csrftoken");

          // Show loading
          document.getElementById("submitText").classList.add("d-none");
          document.getElementById("loadingSpinner").classList.remove("d-none");
          document.getElementById("submitBtn").disabled = true;

          try {
            const response = await fetch("/api/grade/", {
              method: "POST",
              headers: {
                "X-CSRFToken": csrftoken,
                Accept: "application/json",
              },
              body: formData,
            });

            // Check if response is JSON
            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
              throw new Error(
                "Server returned HTML instead of JSON. Status: " +
                  response.status,
              );
            }

            const data = await response.json();

            if (data.success) {
              // Hide form, show result
              document.querySelector(".card").classList.add("d-none");
              document.getElementById("resultCard").classList.remove("d-none");

              // Fill result data
              document.getElementById("grade").textContent = data.grade + "%";
              document.getElementById("corrected_text").textContent =
                data.corrected_text || "No text extracted";

              // Stats
              const stats = `${data.matched_count || data.matched.length}/${data.total_keywords} keywords matched`;
              document.getElementById("stats").textContent = stats;

              // Matched keywords - INDIVIDUAL BADGES
              const matchedDiv = document.getElementById("matched");
              if (data.matched && data.matched.length > 0) {
                matchedDiv.innerHTML = data.matched
                  .map((k) => `<span class="badge bg-success">${k}</span>`)
                  .join("");
              } else {
                matchedDiv.innerHTML = '<span class="text-muted">None</span>';
              }

              // Missing keywords - INDIVIDUAL BADGES
              const missingDiv = document.getElementById("missing");
              if (data.missing && data.missing.length > 0) {
                missingDiv.innerHTML = data.missing
                  .map((k) => `<span class="badge bg-danger">${k}</span>`)
                  .join("");
              } else {
                missingDiv.innerHTML =
                  '<span class="text-success fw-bold">All keywords matched! 🎉</span>';
              }
            } else {
              // Show error
              document.querySelector(".card").classList.add("d-none");
              document.getElementById("errorCard").classList.remove("d-none");
              document.getElementById("errorMessage").textContent =
                data.error || "Unknown error occurred";
            }
          } catch (error) {
            console.error("Error:", error);
            document.querySelector(".card").classList.add("d-none");
            document.getElementById("errorCard").classList.remove("d-none");
            document.getElementById("errorMessage").textContent =
              "Error: " + error.message;
          } finally {
            // Hide loading
            document.getElementById("submitText").classList.remove("d-none");
            document.getElementById("loadingSpinner").classList.add("d-none");
            document.getElementById("submitBtn").disabled = false;
          }
        });
    </script>
  </body>
</html>
